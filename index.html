<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ООО «Сиджакс» — Разработка ПО</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">

    <header class="nav-container">
        <div class="logo">Cjax<span class="dot">.</span>core</div>
        <button id="user-badge" class="btn-secondary" onclick="toggleUserModal()">Войти</button>
    </header>

    <main class="layout-wrapper">
        <section class="hero-block">
            <div class="profile-card">
                <img id="ceo-avatar" src="uploads/avatar_user.jpg" alt="Аватар">
                <h1 id="main-headline">Разработка высокотехнологичного ПО</h1>
            </div>
        </section>
    </main>

    <div id="secure-gate" class="modal-backdrop" style="display: none;">
        <div class="modal-box admin-terminal-box">
            <div id="control-zone" style="display: none;">
                <h3>Панель управления Cjax.core</h3>
                
                <form action="upload_avatar.php" method="POST" enctype="multipart/form-data">
                    <label>Обновить фото профиля (JPG/PNG):</label>
                    <input type="file" name="avatar" accept="image/*" required>
                    <button type="submit" class="btn-primary">Загрузить на сервер</button>
                </form>

                <input type="text" id="input-headline" placeholder="Новый слоган">
                <button onclick="commitDevChanges()">Применить изменения</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
